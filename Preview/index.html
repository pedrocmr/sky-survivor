<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sky Survivor</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020714;
      color: #f7fbff;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #020714;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
      box-sizing: border-box;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 0 12px rgba(75, 245, 255, 0.65);
    }

    .top, .bottom {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .bars {
      width: min(540px, 82vw);
      display: grid;
      gap: 8px;
    }

    .bar {
      height: 18px;
      border: 2px solid rgba(210, 235, 255, 0.75);
      background: rgba(4, 20, 38, 0.86);
      box-shadow: 0 0 18px rgba(75, 245, 255, 0.22);
    }

    .bar div {
      height: 100%;
      width: 100%;
    }

    #lifeFill {
      background: linear-gradient(90deg, #ff2854, #ff7a96);
    }

    #energyFill {
      background: linear-gradient(90deg, #35ff91, #f4ff5c);
    }

    .center {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      pointer-events: none;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(44px, 8vw, 96px);
      color: #4cf6ff;
      text-shadow: 0 0 24px #00eaff;
      line-height: 0.95;
    }

    p {
      margin: 7px 0;
      font-size: clamp(16px, 2.4vw, 24px);
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="top">
      <div>
        <div id="score">SCORE 000000</div>
        <div id="combo"></div>
      </div>
      <div id="time">00:00</div>
    </div>
    <div class="bottom">
      <div class="bars">
        <div>VIDA <span id="lifeText">3/3</span></div>
        <div class="bar"><div id="lifeFill"></div></div>
        <div>ENERGIA <span id="energyText">50/100</span></div>
        <div class="bar"><div id="energyFill"></div></div>
      </div>
      <div>WASD/SETAS: mover<br>ESPACO/MOUSE: atirar<br>SHIFT: dash<br>E: pulso EMP</div>
    </div>
  </div>
  <div id="menu" class="center">
    <div>
      <h1>SKY<br>SURVIVOR</h1>
      <p>Clique ou pressione Espaco para iniciar</p>
      <p>Sobreviva o máximo que conseguir</p>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');
    const scoreText = document.getElementById('score');
    const comboText = document.getElementById('combo');
    const timeText = document.getElementById('time');
    const lifeText = document.getElementById('lifeText');
    const lifeFill = document.getElementById('lifeFill');
    const energyText = document.getElementById('energyText');
    const energyFill = document.getElementById('energyFill');

    const keys = new Set();
    const variants = [
      { name: 'Scout', unlock: 0, weight: 1, ramp: -0.25, hp: 1, speed: 150, radius: 17, score: 80, energy: 5, color: '#59ff61', shotMin: 2.7, shotMax: 4.8, projectile: 0.9 },
      { name: 'Tank', unlock: 30, weight: 0.12, ramp: 0.24, hp: 5, speed: 66, radius: 28, score: 230, energy: 14, color: '#ff1f38', shotMin: 2.4, shotMax: 4.5, projectile: 0.85 },
      { name: 'Sniper', unlock: 55, weight: 0.08, ramp: 0.2, hp: 2, speed: 88, radius: 20, score: 170, energy: 9, color: '#3494ff', shotMin: 1.45, shotMax: 2.55, projectile: 1.2 }
    ];

    let stars = [];
    let enemies = [];
    let playerShots = [];
    let enemyShots = [];
    let playing = false;
    let mouseDown = false;
    let last = performance.now();
    let elapsed = 0;
    let nextSpawn = 0.8;
    let score = 0;
    let combo = 1;
    let comboTimer = 0;
    let energy = 50;
    let fireCooldown = 0;
    let dashTimer = 0;
    let pulseCooldown = 0;
    let pulseFlash = 0;
    let shake = 0;

    const player = { x: 0, y: 0, radius: 18, lives: 3, maxLives: 3, invulnerable: 0 };

    function resize() {
      canvas.width = Math.floor(innerWidth * devicePixelRatio);
      canvas.height = Math.floor(innerHeight * devicePixelRatio);
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      player.x = innerWidth * 0.5;
      player.y = innerHeight - 120;
      stars = Array.from({ length: 130 }, () => ({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        s: 0.7 + Math.random() * 2.4,
        v: 18 + Math.random() * 65
      }));
    }

    function start() {
      playing = true;
      menu.classList.add('hidden');
      elapsed = 0;
      nextSpawn = 0.8;
      score = 0;
      combo = 1;
      comboTimer = 0;
      energy = 50;
      fireCooldown = 0;
      dashTimer = 0;
      pulseCooldown = 0;
      pulseFlash = 0;
      enemies = [];
      playerShots = [];
      enemyShots = [];
      player.x = innerWidth * 0.5;
      player.y = innerHeight - 120;
      player.lives = 3;
      player.invulnerable = 0;
      menu.querySelector('h1').innerHTML = 'SKY<br>SURVIVOR';
      menu.querySelectorAll('p')[0].textContent = 'Clique ou pressione Espaco para iniciar';
      menu.querySelectorAll('p')[1].textContent = 'Sobreviva o máximo que conseguir';
      updateHud();
    }

    function rand(a, b) {
      return a + Math.random() * (b - a);
    }

    function chooseVariant() {
      const ramp = Math.min(1, elapsed / 120);
      const available = variants.filter(v => elapsed >= v.unlock);
      const total = available.reduce((sum, v) => sum + Math.max(0, v.weight + v.ramp * ramp), 0);
      let roll = Math.random() * total;
      for (const variant of available) {
        roll -= Math.max(0, variant.weight + variant.ramp * ramp);
        if (roll <= 0) return variant;
      }
      return variants[0];
    }

    function spawnEnemy() {
      if (enemies.length >= 16) return;
      const variant = chooseVariant();
      enemies.push({
        variant,
        x: 45 + Math.random() * Math.max(1, innerWidth - 90),
        y: -35,
        vx: 0,
        vy: 0,
        hp: variant.hp,
        phase: Math.random() * Math.PI * 2,
        shot: rand(variant.shotMin, variant.shotMax)
      });
    }

    function shoot() {
      playerShots.push({ x: player.x, y: player.y - 24, vx: 0, vy: -650, radius: 5 });
      fireCooldown = 0.18;
      shake = Math.max(shake, 2);
    }

    function pulse() {
      if (energy < 60 || pulseCooldown > 0 || !playing) return;
      energy -= 60;
      pulseCooldown = 0.45;
      pulseFlash = 0.26;
      shake = 9;
      for (const shot of enemyShots) {
        if (Math.hypot(shot.x - player.x, shot.y - player.y) <= 230) {
          shot.dead = true;
        }
      }
      for (const enemy of enemies) {
        if (Math.hypot(enemy.x - player.x, enemy.y - player.y) <= 230) {
          enemy.hp = 0;
        }
      }
    }

    function hitPlayer() {
      if (player.invulnerable > 0 || !playing) return;
      player.lives -= 1;
      player.invulnerable = 1.05;
      shake = 9;
      if (player.lives <= 0) {
        playing = false;
        menu.classList.remove('hidden');
        menu.querySelector('h1').textContent = 'GAME OVER';
        menu.querySelectorAll('p')[0].textContent = 'Clique ou pressione Espaco para reiniciar';
        menu.querySelectorAll('p')[1].textContent = `Pontuacao: ${score.toString().padStart(6, '0')}`;
      }
      updateHud();
    }

    function update(dt) {
      for (const star of stars) {
        star.y += star.v * dt;
        if (star.y > innerHeight + 8) {
          star.y = -8;
          star.x = Math.random() * innerWidth;
        }
      }

      if (!playing) return;

      elapsed += dt;
      fireCooldown = Math.max(0, fireCooldown - dt);
      dashTimer = Math.max(0, dashTimer - dt);
      pulseCooldown = Math.max(0, pulseCooldown - dt);
      pulseFlash = Math.max(0, pulseFlash - dt);
      shake = Math.max(0, shake - dt * 18);
      player.invulnerable = Math.max(0, player.invulnerable - dt);
      comboTimer = Math.max(0, comboTimer - dt);
      if (comboTimer <= 0) combo = 1;

      let mx = 0;
      let my = 0;
      if (keys.has('KeyA') || keys.has('ArrowLeft')) mx -= 1;
      if (keys.has('KeyD') || keys.has('ArrowRight')) mx += 1;
      if (keys.has('KeyW') || keys.has('ArrowUp')) my -= 1;
      if (keys.has('KeyS') || keys.has('ArrowDown')) my += 1;
      const moveLen = Math.hypot(mx, my) || 1;
      mx /= moveLen;
      my /= moveLen;

      if ((keys.has('Space') || mouseDown) && fireCooldown <= 0) shoot();
      if ((keys.has('ShiftLeft') || keys.has('ShiftRight')) && dashTimer <= 0 && energy >= 25 && (mx || my)) {
        energy -= 25;
        dashTimer = 0.22;
        player.invulnerable = Math.max(player.invulnerable, 0.22);
      }

      const speed = dashTimer > 0 ? 790 : 325;
      player.x = Math.max(30, Math.min(innerWidth - 30, player.x + mx * speed * dt));
      player.y = Math.max(50, Math.min(innerHeight - 50, player.y + my * speed * dt));

      nextSpawn -= dt;
      if (nextSpawn <= 0) {
        spawnEnemy();
        const ramp = Math.min(1, elapsed / 120);
        const difficulty = 1 + elapsed / 70;
        nextSpawn = rand(0.8, 1.2) * ((1.9 + (0.75 - 1.9) * ramp) / Math.min(1.45, Math.max(1, difficulty * 0.6)));
      }

      for (const shot of playerShots) {
        shot.x += shot.vx * dt;
        shot.y += shot.vy * dt;
      }

      const difficulty = 1 + elapsed / 70;
      for (const enemy of enemies) {
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const dist = Math.hypot(dx, dy) || 1;
        const wave = Math.sin(elapsed * 2.2 + enemy.phase) * 54;
        const targetVx = dx / dist * enemy.variant.speed * 0.55 + wave;
        const targetVy = Math.max(60, dy / dist * enemy.variant.speed) + enemy.variant.speed * 0.35;
        enemy.vx += (targetVx - enemy.vx) * 3.5 * dt;
        enemy.vy += (targetVy - enemy.vy) * 3.5 * dt;
        enemy.x += enemy.vx * dt * Math.min(2.2, difficulty * 0.75);
        enemy.y += enemy.vy * dt * Math.min(2.2, difficulty * 0.75);
        enemy.shot -= dt;
        if (enemy.shot <= 0) {
          const sx = player.x - enemy.x;
          const sy = player.y - enemy.y;
          const sl = Math.hypot(sx, sy) || 1;
          const speed = 235 * enemy.variant.projectile * Math.min(1.65, 1 + elapsed / 130);
          enemyShots.push({ x: enemy.x, y: enemy.y, vx: sx / sl * speed, vy: sy / sl * speed, radius: 8 });
          enemy.shot = rand(enemy.variant.shotMin, enemy.variant.shotMax) / Math.min(2.5, Math.max(1, difficulty));
        }
      }

      for (const shot of enemyShots) {
        shot.x += shot.vx * dt;
        shot.y += shot.vy * dt;
      }

      for (const shot of playerShots) {
        for (const enemy of enemies) {
          if (Math.hypot(shot.x - enemy.x, shot.y - enemy.y) < shot.radius + enemy.variant.radius) {
            shot.dead = true;
            enemy.hp -= 1;
          }
        }
      }

      for (const enemy of enemies) {
        if (enemy.hp <= 0) {
          enemy.dead = true;
          score += enemy.variant.score * combo;
          energy = Math.min(100, energy + enemy.variant.energy);
          combo = Math.min(8, combo + 1);
          comboTimer = 3;
          shake = Math.max(shake, 4);
        } else if (enemy.y > innerHeight + 70) {
          enemy.dead = true;
          combo = 1;
        } else if (Math.hypot(enemy.x - player.x, enemy.y - player.y) < enemy.variant.radius + player.radius) {
          enemy.dead = true;
          hitPlayer();
        }
      }

      for (const shot of enemyShots) {
        if (Math.hypot(shot.x - player.x, shot.y - player.y) < shot.radius + player.radius) {
          shot.dead = true;
          hitPlayer();
        }
      }

      playerShots = playerShots.filter(s => !s.dead && s.y > -40);
      enemyShots = enemyShots.filter(s => !s.dead && s.x > -60 && s.x < innerWidth + 60 && s.y > -60 && s.y < innerHeight + 60);
      enemies = enemies.filter(e => !e.dead);
      updateHud();
    }

    function updateHud() {
      scoreText.textContent = `SCORE ${score.toString().padStart(6, '0')}`;
      comboText.textContent = combo > 1 ? `COMBO x${combo}` : '';
      const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
      const seconds = Math.floor(elapsed % 60).toString().padStart(2, '0');
      timeText.textContent = `${minutes}:${seconds}`;
      lifeText.textContent = `${Math.max(0, player.lives)}/${player.maxLives}`;
      lifeFill.style.width = `${Math.max(0, player.lives) / player.maxLives * 100}%`;
      energyText.textContent = `${Math.ceil(energy)}/100`;
      energyFill.style.width = `${energy}%`;
    }

    function drawPlayer(x, y) {
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = player.invulnerable > 0 && Math.floor(performance.now() / 80) % 2 === 0 ? '#ffffff' : '#35dfff';
      ctx.shadowColor = '#35dfff';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.moveTo(0, -30);
      ctx.lineTo(11, 7);
      ctx.lineTo(30, 22);
      ctx.lineTo(10, 17);
      ctx.lineTo(5, 30);
      ctx.lineTo(0, 20);
      ctx.lineTo(-5, 30);
      ctx.lineTo(-10, 17);
      ctx.lineTo(-30, 22);
      ctx.lineTo(-11, 7);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#f7ffff';
      ctx.beginPath();
      ctx.moveTo(0, -20);
      ctx.lineTo(6, 6);
      ctx.lineTo(0, 14);
      ctx.lineTo(-6, 6);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ffe85d';
      ctx.fillRect(-8, 20, 5, 13);
      ctx.fillRect(3, 20, 5, 13);
      ctx.restore();
    }

    function drawEnemy(enemy) {
      const scale = enemy.variant.radius / 18;
      ctx.save();
      ctx.translate(enemy.x, enemy.y);
      ctx.rotate(Math.PI);
      ctx.scale(scale, scale);
      ctx.fillStyle = enemy.variant.color;
      ctx.shadowColor = enemy.variant.color;
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.moveTo(0, -24);
      ctx.lineTo(22, -11);
      ctx.lineTo(34, 7);
      ctx.lineTo(17, 4);
      ctx.lineTo(10, 25);
      ctx.lineTo(0, 15);
      ctx.lineTo(-10, 25);
      ctx.lineTo(-17, 4);
      ctx.lineTo(-34, 7);
      ctx.lineTo(-22, -11);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#fff0ff';
      ctx.beginPath();
      ctx.arc(0, -2, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function render() {
      const ox = shake > 0 ? (Math.random() - 0.5) * shake : 0;
      const oy = shake > 0 ? (Math.random() - 0.5) * shake : 0;
      ctx.save();
      ctx.clearRect(0, 0, innerWidth, innerHeight);
      ctx.translate(ox, oy);
      ctx.strokeStyle = 'rgba(35, 150, 220, 0.14)';
      for (let x = 0; x < innerWidth; x += 64) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, innerHeight);
        ctx.stroke();
      }
      for (let y = 0; y < innerHeight; y += 64) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(innerWidth, y);
        ctx.stroke();
      }
      for (const star of stars) {
        ctx.fillStyle = `rgba(255,255,255,${0.35 + star.s * 0.15})`;
        ctx.fillRect(star.x, star.y, star.s, star.s);
      }
      for (const shot of playerShots) {
        ctx.fillStyle = '#ffe85d';
        ctx.shadowColor = '#ffe85d';
        ctx.shadowBlur = 16;
        ctx.fillRect(shot.x - 3, shot.y - 15, 6, 30);
      }
      for (const shot of enemyShots) {
        ctx.fillStyle = '#ff45d5';
        ctx.shadowColor = '#ff45d5';
        ctx.shadowBlur = 18;
        ctx.beginPath();
        ctx.arc(shot.x, shot.y, shot.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      for (const enemy of enemies) drawEnemy(enemy);
      if (playing) drawPlayer(player.x, player.y);
      if (pulseFlash > 0) {
        ctx.strokeStyle = `rgba(75,245,255,${pulseFlash * 3})`;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 230 * (1 - pulseFlash / 0.26), 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
      ctx.shadowBlur = 0;
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    addEventListener('resize', resize);
    addEventListener('keydown', event => {
      if (event.code === 'Space' && !playing) start();
      if (event.code === 'KeyE' && !event.repeat) pulse();
      keys.add(event.code);
    });
    addEventListener('keyup', event => keys.delete(event.code));
    addEventListener('mousedown', () => {
      mouseDown = true;
      if (!playing) start();
    });
    addEventListener('mouseup', () => {
      mouseDown = false;
    });

    resize();
    updateHud();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
